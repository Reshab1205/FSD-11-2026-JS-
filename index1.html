<html lang="en">

</head>

<body>
    <div>
        <div>
            <p>Bye</p>
        </div>
        <div>
            <p>Good bYE</p>
        </div>
    </div>
    <h1 id="h1">F11</h1>
   <p id="p2">Hello</p>
   <p id="p1"></p>
   <input id="i1" type="text" />
   <ul name="ul" id="ul"></ul>
   <button onclick="changeHeading()" >Click to Change Heading</button>
   <button onclick="addList()" >Add List</button>
   <button onclick="msg()" >Click</button>

   <script>

    const arr = ['Bhopal', 'Indore', 'Ujjain', 'Gwalior', 'Jabalpur']
    let i = 0

    function changeHeading() {
        document.getElementById('h1').innerText = arr[i]
        // i = i + 1;
        i++;
        if(i >= arr.length) {
            i = 0
        }
    }

    function addList() {
        const parentEL = document.getElementById('ul')
        let input = document.getElementById('i1').value
        const createLi = document.createElement('li')
        const editBtn = document.createElement('button')
        editBtn.onclick = function () {
            
        }
        const deleteBtn = document.createElement('button')
        editBtn.textContent = 'Edit'
        deleteBtn.textContent = 'Delete'
        createLi.textContent = input
        createLi.appendChild(editBtn)
        createLi.appendChild(deleteBtn)
        parentEL.appendChild(createLi)
        document.getElementById('i1').value = " "
    }
    console.log(typeof (document.getElementById('p1')))

    function msg() {
        const data = document.getElementById('p2').textContent
        document.getElementById('p1').innerText = data
    }
    document.getElementById('p1').innerText = 'Hiii'
   </script>
   
</body>
