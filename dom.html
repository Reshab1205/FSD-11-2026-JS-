<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      /* span {
        text-decoration: line-through;
      } */
    </style>
  </head>
  <body>
    <input id="inp" type="text" placeholder="Enter Your Todo here ...." />
    <button onclick="addTodo()">Add Todo</button>
    <h3>Todos:-</h3>
    <ul id="ul"></ul>

    <script>
      let data = JSON.parse(localStorage.getItem("todo")) || [];
      function addTodo() {
        const todo = document.getElementById("inp").value;
        if (todo.trim() === "") {
          alert("Enter Your Data");
          return;
        }
        data.push({todo:todo, completed:false});
        localStorage.setItem("todo", JSON.stringify(data));
        document.getElementById("inp").value = "";
        displayTodo();
      }

      function displayTodo() {
        const PE = document.getElementById("ul");
        PE.innerHTML = "";
        for (let i in data) {
          console.log(data[i])
          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";

          const li = document.createElement("li");
          const span = document.createElement("span");
          span.textContent = data[i].todo;
          checkbox.onchange = function () {
            if (checkbox.checked === true) {
              
              span.style.textDecoration = "line-through";
            } else {
              span.style.textDecoration = "none";
            }
          };
          const editBtn = document.createElement("button");
          editBtn.textContent = "Edit";
          editBtn.onclick = function () {
            const newData = prompt("Enter new Data", data[i].todo);
            data[i].todo = newData;
            localStorage.setItem("todo", JSON.stringify(data));
            displayTodo();
          };

          const delBtn = document.createElement("button");
          delBtn.textContent = "Delete";
          delBtn.onclick = function () {
            data.splice(i, 1);
            localStorage.setItem("todo", JSON.stringify(data));
            displayTodo();
          };
          li.appendChild(checkbox);
          li.appendChild(span);
          li.appendChild(editBtn);
          li.appendChild(delBtn);
          PE.appendChild(li);
        }
      }
      window.onload = displayTodo;
    </script>
  </body>
</html>
